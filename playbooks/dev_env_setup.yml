---
- name: Setup Development Environment
  hosts: localhost
  connection: local
  become: false
  vars:

    # Dot Files
    clone_dotfiles_repo: "git@github.com:bhupinderhappy777/dotfiles.git"
    clone_dotfiles_branch: "plasma"
    clone_dotfiles_home: "{{ ansible_facts['user_dir'] }}/dotfiles"

  roles:
    - { role: management, tags: ["management"] }
    - { role: clone_dotfiles, tags: ["clone"] }
    - { role: stow, tags: ["stow"] } # --skip-tags=gui
    - { role: zsh, tags: ["zsh"] }
