---
- name: Setup Development Environment
  hosts: localhost
  connection: local
  become: false
  vars:
    # Dot Files
    dotfiles_repo: "git@github.com:bhupinderhappy777/dotfiles.git"
    dotfiles_branch: "main"

    # Chezmoi logic
    chezmoi_force_apply: true
    remove_legacy_dotfiles: false

  pre_tasks:
    - name: Detect target user and home
      ansible.builtin.set_fact:
        target_user: "{{ ansible_env.get('USER') | default(ansible_user_id, true) }}"
        target_home: "{{ ansible_env.get('HOME') | default(lookup('env', 'HOME'), true) }}"
      tags: [always]

    - name: Detect if GUI environment is present
      ansible.builtin.set_fact:
        is_gui: "{{ (ansible_env.DISPLAY is defined and ansible_env.DISPLAY | length > 0) or 
                    (ansible_env.WAYLAND_DISPLAY is defined and ansible_env.WAYLAND_DISPLAY | length > 0) or
                    (ansible_env.XDG_CURRENT_DESKTOP is defined and ansible_env.XDG_CURRENT_DESKTOP | length > 0) }}"
      tags: [always]

    - name: Set Plasma Version Logic
      ansible.builtin.set_fact:
        plasma_v: "{{ 'v6' if ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version'] | int >= 40 else 'v5' }}"
      when: is_gui
      tags: [always]

    - name: User-only mode active
      ansible.builtin.debug:
        msg: "Running in user-only mode (no sudo/become). Root-required tasks are skipped with warnings."
      tags: [always]

    - name: Check for legacy ~/dotfiles directory
      ansible.builtin.stat:
        path: "{{ target_home }}/dotfiles"
      register: legacy_dotfiles_stat
      tags: [always]

    - name: Decide whether to force chezmoi source reinit and cleanup
      ansible.builtin.set_fact:
        remove_legacy_dotfiles: "{{ legacy_dotfiles_stat.stat.exists }}"
        chezmoi_migrate_force_source_init: "{{ legacy_dotfiles_stat.stat.exists }}"
        chezmoi_migrate_patch_plasma_scripts: "{{ legacy_dotfiles_stat.stat.exists }}"
      tags: [always]

  roles:
    - { 
        role: management, 
        tags: ["management", "cli"],
        management_user: "{{ target_user }}",
        management_home: "{{ target_home }}"
      }
    - { 
        role: chezmoi, 
        tags: ["chezmoi", "cli"], 
        chezmoi_user: "{{ target_user }}",
        chezmoi_home: "{{ target_home }}",
        chezmoi_repo: "{{ dotfiles_repo }}",
        chezmoi_branch: "{{ dotfiles_branch }}",
        chezmoi_source_path: "{{ target_home }}/.local/share/chezmoi",
        chezmoi_force_source_init: "{{ chezmoi_migrate_force_source_init }}",
        chezmoi_patch_plasma_scripts: "{{ chezmoi_migrate_patch_plasma_scripts }}",
        chezmoi_exclude: "{{ ['scripts'] if not is_gui else [] }}" 
      }
    - { 
        role: zsh, 
        tags: ["zsh", "cli"],
        zsh_user: "{{ target_user }}",
        zsh_home: "{{ target_home }}"
      }

    # Desktop related roles (only run if GUI is detected)
    - { role: plasma, tags: ["plasma", "gui"], when: is_gui, dotfiles_home: "{{ target_home }}/.local/share/chezmoi" }
    - { role: vscode, tags: ["vscode", "gui"], when: is_gui }

  post_tasks:
    - name: Remove legacy ~/dotfiles after migrating to chezmoi source
      ansible.builtin.file:
        path: "{{ target_home }}/dotfiles"
        state: absent
      when: remove_legacy_dotfiles | bool
      tags: [chezmoi, cleanup]
