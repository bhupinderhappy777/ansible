---
- name: Setup Development Environment
  hosts: localhost
  connection: local
  become: false
  vars:
    # Dot Files
    clone_dotfiles_repo: "git@github.com:bhupinderhappy777/dotfiles.git"
    clone_dotfiles_branch: "main"
    clone_dotfiles_home: "{{ target_home }}/dotfiles"

    # Chezmoi logic
    chezmoi_force_apply: true

  pre_tasks:
    - name: Detect target user and home
      ansible.builtin.set_fact:
        target_user: "{{ ansible_env.get('SUDO_USER') | default(ansible_env.get('USER'), true) | default(ansible_user_id, true) }}"
        target_home: "{{ ('/home/' ~ ansible_env.get('SUDO_USER')) if (ansible_env.get('SUDO_USER') | default('', true) | length > 0) else (ansible_env.get('HOME') | default(lookup('env', 'HOME'), true)) }}"
      tags: [always]

    - name: Detect if GUI environment is present
      ansible.builtin.set_fact:
        is_gui: "{{ (ansible_env.DISPLAY is defined and ansible_env.DISPLAY | length > 0) or 
                    (ansible_env.WAYLAND_DISPLAY is defined and ansible_env.WAYLAND_DISPLAY | length > 0) or
                    (ansible_env.XDG_CURRENT_DESKTOP is defined and ansible_env.XDG_CURRENT_DESKTOP | length > 0) }}"
      tags: [always]

    - name: Set Plasma Version Logic
      ansible.builtin.set_fact:
        plasma_v: "{{ 'v6' if ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version'] | int >= 40 else 'v5' }}"
      when: is_gui
      tags: [always]

    - name: Ensure target user owns their home directory (Fix root-owned files)
      ansible.builtin.file:
        path: "{{ target_home }}"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        recurse: no # We only want the top level and known config dirs to be fast
      become: true
      tags: [always]

    - name: Fix ownership of critical config directories
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        state: directory
        recurse: yes
      loop:
        - "{{ target_home }}/.config"
        - "{{ target_home }}/.local"
        - "{{ target_home }}/.ansible"
      become: true
      ignore_errors: true
      tags: [always]

  roles:
    - { 
        role: management, 
        tags: ["management", "cli"],
        management_user: "{{ target_user }}",
        management_home: "{{ target_home }}"
      }
    - { 
        role: clone_dotfiles, 
        tags: ["clone", "cli"],
        clone_dotfiles_user: "{{ target_user }}",
        clone_dotfiles_user_home: "{{ target_home }}",
        clone_dotfiles_home: "{{ target_home }}/dotfiles"
      }
    - { 
        role: chezmoi, 
        tags: ["chezmoi", "cli"], 
        chezmoi_user: "{{ target_user }}",
        chezmoi_home: "{{ target_home }}",
        chezmoi_repo: "{{ target_home }}/dotfiles",
        chezmoi_exclude: "{{ ['scripts'] if not is_gui else [] }}" 
      }
    - { 
        role: zsh, 
        tags: ["zsh", "cli"],
        zsh_user: "{{ target_user }}",
        zsh_home: "{{ target_home }}"
      }

    # Desktop related roles (only run if GUI is detected)
    - { role: plasma, tags: ["plasma", "gui"], when: is_gui }
    - { role: vscode, tags: ["vscode", "gui"], when: is_gui }
