---
- name: Container / Dev Environment Setup
  hosts: all
  connection: local
  gather_facts: true
  vars:
    ansible_python_interpreter: auto_silent
    clone_dotfiles_repo: "https://github.com/bhupinderhappy777/dotfiles.git"
    clone_dotfiles_branch: "main"

  tasks:
    - name: Ensure git and chezmoi are installed (if root)
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      loop: [git, chezmoi, zsh]
      when: ansible_user_uid == 0
      failed_when: false

    - name: Initialize chezmoi from dotfiles repository
      ansible.builtin.command:
        cmd: "chezmoi init --branch {{ clone_dotfiles_branch }} {{ clone_dotfiles_repo }}"
      register: chezmoi_init
      failed_when: false
      changed_when: false

    - name: Apply chezmoi dotfiles
      ansible.builtin.command:
        cmd: chezmoi apply
      when: chezmoi_init.rc == 0
      failed_when: false
      changed_when: false

    - name: Setup Zsh Plugin Manager (Antidote/Oh-My-Zsh)
      # Simplified version of zsh role for containers
      ansible.builtin.git:
        repo: "https://github.com/ohmyzsh/ohmyzsh.git"
        dest: "{{ lookup('env', 'HOME') }}/.oh-my-zsh"
        version: "master"
        depth: 1
