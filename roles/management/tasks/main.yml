---
- name: OCI | Root package install skipped in user-only mode
  ansible.builtin.debug:
    msg: "Skipping system dependency installation. Ensure python3-venv, pip, openssl, and compiler libraries are preinstalled."

- name: Create OCI venv and install OCI packages
  ansible.builtin.pip:
    name: [pip, oci, oci-cli]
    state: present
    virtualenv: "{{ management_oci_venv_path }}"
    virtualenv_command: python3 -m venv

- name: Create OCI configuration directory
  ansible.builtin.file:
    path: "{{ management_home }}/.oci"
    state: directory
    mode: "0700"

- name: Deploy OCI configuration file
  ansible.builtin.template:
    src: oci_config.j2
    dest: "{{ management_home }}/.oci/config"
    mode: "0600"

- name: OCI - Deploy Private Key
  ansible.builtin.copy:
    content: "{{ private_key }}"
    dest: "{{ management_home }}/.oci/oci_api_key.pem"
    mode: "0600"
  no_log: true # Hide sensitive data from logs

- name: Check if OCI API key exists
  ansible.builtin.stat:
    path: "{{ management_home }}/.oci/oci_api_key.pem"
  register: management_oci_key_stat

- name: Generate OCI API private key if missing
  ansible.builtin.command: >
    openssl genrsa -out {{ management_home }}/.oci/oci_api_key.pem 2048
  args:
    creates: "{{ management_home }}/.oci/oci_api_key.pem"
  when: not management_oci_key_stat.stat.exists

- name: Generate OCI API public key
  ansible.builtin.command: >
    openssl rsa -pubout -in {{ management_home }}/.oci/oci_api_key.pem
    -out {{ management_home }}/.oci/oci_api_key_public.pem
  args:
    creates: "{{ management_home }}/.oci/oci_api_key_public.pem"

- name: Fetch public key for manual console upload
  ansible.builtin.slurp:
    src: "{{ management_home }}/.oci/oci_api_key_public.pem"
  register: management_oci_pub_key

- name: Show Public Key for OCI Console
  ansible.builtin.debug:
    msg: "{{ management_oci_pub_key['content'] | b64decode }}"
