---
- name: Linux - ensure auditd present (where available)
  ansible.builtin.package:
    name: auditd
    state: present
  when:
    - ansible_facts['os_family'] in ['RedHat', 'Debian']
    - hardening_enable_auditd | default(true)
    - not (hardening_verify_only | default(false))
  tags:
    - security
    - security:audit


