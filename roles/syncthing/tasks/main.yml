---
- name: Ensure base directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0700'
  loop:
    - "{{ ansible_facts['env']['HOME'] }}/.local/bin"
    - "{{ ansible_facts['env']['HOME'] }}/.local/state/syncthing"

- name: Create sync folders from config
  ansible.builtin.file:
    path: "{{ item | replace('~', ansible_facts['env']['HOME']) }}"
    state: directory
    mode: '0755'
  loop:
    - "~/Inbox_Folder/Mobile/Pixel8/Download"
    - "~/Inbox_Folder/Mobile/Pixel8/WA"
    - "~/Inbox_Folder/Mobile/Pixel8/Pictures"
    - "~/Inbox_Folder/Mobile/Pixel8/Whatsapp_Media"
    - "~/Videos"
    - "~/Pictures"
    - "/home/bhupi/Inbox_Folder/Mobile/S21/Telegram"
    - "/home/bhupi/Inbox_Folder/Mobile/S21/Downloads"
    - "/home/bhupi/Inbox_Folder/Mobile/S21/WA"
    - "/home/bhupi/Inbox_Folder/Mobile/S21/Camera"
    - "/home/bhupi/Inbox_Folder/Mobile/Pixel10/Camera"
    - "/home/bhupi/Inbox_Folder/Mobile/Pixel10/Download"
    - "/home/bhupi/Inbox_Folder/Mobile/Pixel10/Whatsapp_Media"
    - "/home/bhupi/Sync"

- name: Create .stfolder markers
  ansible.builtin.file:
    path: "{{ item | replace('~', ansible_facts['env']['HOME']) }}/.stfolder"
    state: directory
    mode: '0755'
  loop:
    - "~/Inbox_Folder/Mobile/Pixel8/Download"
    - "~/Inbox_Folder/Mobile/Pixel8/WA"
    - "~/Inbox_Folder/Mobile/Pixel8/Pictures"
    - "~/Inbox_Folder/Mobile/Pixel8/Whatsapp_Media"
    - "~/Videos"
    - "~/Pictures"
    - "/home/bhupi/Inbox_Folder/Mobile/S21/Telegram"
    - "/home/bhupi/Inbox_Folder/Mobile/S21/Downloads"
    - "/home/bhupi/Inbox_Folder/Mobile/S21/WA"
    - "/home/bhupi/Inbox_Folder/Mobile/S21/Camera"
    - "/home/bhupi/Inbox_Folder/Mobile/Pixel10/Camera"
    - "/home/bhupi/Inbox_Folder/Mobile/Pixel10/Download"
    - "/home/bhupi/Inbox_Folder/Mobile/Pixel10/Whatsapp_Media"
    - "/home/bhupi/Sync"

- name: Download and extract Syncthing
  ansible.builtin.unarchive:
    src: "https://github.com/syncthing/syncthing/releases/download/v{{ syncthing_version }}/syncthing-linux-amd64-v{{ syncthing_version }}.tar.gz"
    dest: "/tmp"
    remote_src: true

- name: Install binary
  ansible.builtin.copy:
    src: "/tmp/syncthing-linux-amd64-v{{ syncthing_version }}/syncthing"
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin/syncthing"
    mode: '0755'
    remote_src: true

- name: Deploy Vaulted Identity, HTTPS Keys, and Config
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/state/syncthing/{{ item.dest }}"
    mode: '0600'
  loop:
    - { src: 'cert.pem', dest: 'cert.pem' }
    - { src: 'key.pem', dest: 'key.pem' }
    - { src: 'https-cert.pem', dest: 'https-cert.pem' }
    - { src: 'https-key.pem', dest: 'https-key.pem' }
    - { src: 'config.xml', dest: 'config.xml' }
  no_log: true
  notify: restart syncthing

- name: Reset GUI credentials
  ansible.builtin.replace:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/state/syncthing/config.xml"
    regexp: '<user>.*</user>\s*<password>.*</password>'
    replace: '<user></user><password></password>'
  notify: restart syncthing


- name: Setup Systemd User Service
  ansible.builtin.template:
    src: syncthing.service.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/systemd/user/syncthing.service"
    mode: '0644'
  notify: restart syncthing

- name: Enable and Start Service
  ansible.builtin.systemd:
    name: syncthing
    scope: user
    enabled: true
    state: started
    daemon_reload: true
