---
- name: Install Virtualization Packages
  ansible.builtin.package:
    name: "{{ (ansible_facts.os_family == 'RedHat') | ternary(['@virtualization', 'bridge-utils', 'libvirt-devel'], ['qemu-kvm', 'libvirt-daemon-system', 'libvirt-clients', 'virt-manager', 'bridge-utils']) }}"
    state: present

- name: Configure Fedora Modular Virtualization
  ansible.builtin.systemd:
    name: "{{ item }}.socket"
    state: started
    enabled: yes
  loop:
    - virtqemud
    - virtnetworkd
    - virtlogd
    - virtstoraged
  when: ansible_facts.os_family == "RedHat"

- name: Configure Ubuntu Monolithic Daemon
  ansible.builtin.systemd:
    name: libvirtd
    state: started
    enabled: yes
  when: ansible_facts.os_family == "Debian"

- name: Add user to virt groups
  ansible.builtin.user:
    name: "{{ lookup('env', 'USER') }}"
    groups: "{{ (ansible_facts.os_family == 'RedHat') | ternary(['libvirt', 'kvm'], ['libvirt', 'kvm']) }}"
    append: yes
