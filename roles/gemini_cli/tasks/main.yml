---
- name: Gemini CLI | Ensure pip is installed
  ansible.builtin.package:
    name: "{{ gemini_cli_pip_package }}"
    state: present
  become: true

- name: Gemini CLI | Install via pip
  ansible.builtin.pip:
    name: "{{ gemini_cli_package }}{{ ('==' + gemini_cli_version) if gemini_cli_version else '' }}"
    state: "{{ gemini_cli_state }}"
    executable: pip3
    extra_args: "{{ gemini_cli_pip_extra_args }}"
  become: true

- name: Gemini CLI | Verify is available
  ansible.builtin.command: "{{ gemini_cli_bin }} --version"
  register: gemini_cli_version_out
  failed_when: gemini_cli_version_out.rc != 0
  changed_when: false

- name: Gemini CLI | Show installed version
  ansible.builtin.debug:
    var: gemini_cli_version_out.stdout
