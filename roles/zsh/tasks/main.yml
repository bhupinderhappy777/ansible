---
# tasks file for roles/zsh
- name: ZSH | Check if zsh is available
  ansible.builtin.command: command -v zsh
  register: zsh_cmd_check
  changed_when: false
  failed_when: false

- name: ZSH | Root package install skipped in user-only mode
  ansible.builtin.debug:
    msg: "zsh is not installed. Install it manually with your package manager, then rerun this playbook."
  when: zsh_cmd_check.rc != 0

- name: ZSH | Check if Starship is installed
  ansible.builtin.stat:
    path: "{{ zsh_home }}/.local/bin/starship"
  register: zsh_starship_bin

- name: ZSH | Ensure user-local bin directory exists
  ansible.builtin.file:
    path: "{{ zsh_home }}/.local/bin"
    state: directory
    mode: "0755"

- name: ZSH | Install Starship Prompt
  ansible.builtin.shell: |
    set -o pipefail
    curl -sS https://starship.rs/install.sh | sh -s -- -y -b {{ zsh_home }}/.local/bin
  args:
    executable: /bin/bash
  when: not zsh_starship_bin.stat.exists
  register: zsh_starship_install
  changed_when: zsh_starship_install.rc == 0

- name: ZSH | Install Oh My Zsh
  ansible.builtin.git:
    repo: "https://github.com/ohmyzsh/ohmyzsh.git"
    dest: "{{ zsh_home }}/.oh-my-zsh"
    version: master
    depth: 1
  when: zsh_cmd_check.rc == 0

- name: ZSH | Install Plugins
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ zsh_home }}/.oh-my-zsh/custom/plugins/{{ item.name }}"
    version: master
    update: true
    depth: 1
  loop:
    - { name: "zsh-autosuggestions", repo: "https://github.com/zsh-users/zsh-autosuggestions" }
    - { name: "zsh-syntax-highlighting", repo: "https://github.com/zsh-users/zsh-syntax-highlighting.git" }
    - { name: "autoswitch_virtualenv", repo: "https://github.com/MichaelAquilina/zsh-autoswitch-virtualenv" }
    - { name: "zsh-history-substring-search", repo: "https://github.com/zsh-users/zsh-history-substring-search" }
  when: zsh_cmd_check.rc == 0

- name: ZSH | Default shell change skipped in user-only mode
  ansible.builtin.debug:
    msg: "Skipping default shell change. Run chsh -s $(command -v zsh) manually if desired."
  when: zsh_cmd_check.rc == 0
