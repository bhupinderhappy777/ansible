---
# tasks file for roles/zsh
- name: Install Zsh if not present
  ansible.builtin.package:
    name: zsh
    state: present
  become: true

- name: ZSH | Download Starship Installer
  ansible.builtin.get_url:
    url: https://starship.rs/install.sh
    dest: /tmp/starship_install.sh
    mode: "0755"

- name: ZSH | Install Starship Prompt
  ansible.builtin.command:
    cmd: /tmp/starship_install.sh -y
    creates: /usr/local/bin/starship
  become: true

- name: ZSH | Install Oh My Zsh
  ansible.builtin.git:
    repo: "https://github.com/ohmyzsh/ohmyzsh.git"
    dest: "{{ ansible_facts['user_dir'] }}/.oh-my-zsh"
    version: master
    depth: 1
  # The git module is idempotent; it won't re-clone if the dest exists.
  # Using ansible_facts['user_dir'] is safer than ansible_user_dir in some versions.

- name: ZSH | Install Plugins
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ ansible_facts['user_dir'] }}/.oh-my-zsh/custom/plugins/{{ item.name }}"
    version: master
    update: true
  loop:
    - { name: "zsh-autosuggestions", repo: "https://github.com/zsh-users/zsh-autosuggestions" }
    - { name: "zsh-syntax-highlighting", repo: "https://github.com/zsh-users/zsh-syntax-highlighting.git" }
    - { name: "autoswitch_virtualenv", repo: "https://github.com/MichaelAquilina/zsh-autoswitch-virtualenv" }
    - { name: "zsh-history-substring-search", repo: "https://github.com/zsh-users/zsh-history-substring-search" }
- name: Ensure Zsh is the default shell
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    shell: /usr/bin/zsh
  become: true
