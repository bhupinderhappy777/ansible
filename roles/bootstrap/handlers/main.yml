---
- name: Restart SSH
  ansible.builtin.service:
    name: "{{ bootstrap_ssh_service_name }}"
    state: restarted
  become: true

- name: Reload firewalld
  ansible.builtin.service:
    name: firewalld
    state: reloaded
  when: ansible_facts['os_family'] == "RedHat"
  become: true

- name: Reload ufw
  ansible.builtin.service:
    name: ufw
    state: reloaded
  when: ansible_facts['os_family'] == "Debian"
  become: true
