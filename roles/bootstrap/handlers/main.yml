---
- name: Restart SSH
  ansible.builtin.service:
    name: "{{ bootstrap_ssh_service_name }}"
    state: restarted
  become: true
  register: bootstrap_restart_ssh_status
  failed_when:
    - bootstrap_restart_ssh_status.failed
    - "'molecule' not in group_names"

- name: Reload firewalld
  ansible.builtin.service:
    name: firewalld
    state: reloaded
  when: ansible_facts['os_family'] == "RedHat"
  become: true
  register: bootstrap_reload_firewalld_status
  failed_when:
    - bootstrap_reload_firewalld_status.failed
    - "'molecule' not in group_names"

- name: Reload ufw
  ansible.builtin.service:
    name: ufw
    state: reloaded
  when: ansible_facts['os_family'] == "Debian"
  become: true
  register: bootstrap_reload_ufw_status
  failed_when:
    - bootstrap_reload_ufw_status.failed
    - "'molecule' not in group_names"
