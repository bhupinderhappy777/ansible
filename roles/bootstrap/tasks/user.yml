---
# Prepare the Targets (Remote Nodes)

- name: USER | Ensure the admin user exists
  ansible.builtin.user:
    name: "{{ ansible_user | default(ansible_facts['user_id']) }}"
    groups: "{{ bootstrap_admin_group }}"
    append: true
    create_home: true
    state: present
    shell: /bin/bash
  become: true

- name: USER | Configure passwordless sudo for admin user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ ansible_user | default(ansible_facts['user_id']) }}"
    content: |
      {{ ansible_user | default(ansible_facts['user_id']) }} ALL=(ALL) NOPASSWD: ALL
    owner: root
    group: root
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"
  become: true
