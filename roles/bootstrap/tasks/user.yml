---
# Prepare the Targets (Remote Nodes)

- name: TARGET - Ensure the user exists
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: "{{ bootstrap_admin_group }}"
    append: true
    create_home: true
    state: present 

- name: TARGET - Configure passwordless sudo for "{{ ansible_user }}"
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ ansible_user }}"
    content: |
      %{{ bootstrap_admin_group }} ALL=(ALL) NOPASSWD: ALL
    owner: root
    group: root
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'  # Validate sudoers file before applying
