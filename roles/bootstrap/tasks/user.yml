---
# Prepare the Targets (Remote Nodes)

- name: USER | Ensure the admin user exists
  ansible.builtin.user:
    name: "{{ bootstrap_user }}"
    groups: "{{ bootstrap_admin_group }}"
    append: true
    create_home: true
    state: present
    shell: /bin/bash
  become: true

- name: USER | Configure passwordless sudo for admin user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ bootstrap_user }}"
    content: |
      {{ bootstrap_user }} ALL=(ALL) NOPASSWD: ALL
    owner: root
    group: root
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"
  become: true
