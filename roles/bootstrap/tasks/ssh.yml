---
- name: SSH | Set OS-specific variables
  ansible.builtin.set_fact:
    ssh_service: "{{ bootstrap_ssh_service_mapping[ansible_facts['os_family']]['service'] }}"

- name: SSH | Ensure OpenSSH Server is installed
  ansible.builtin.package:
    name: openssh-server
    state: present
  become: true

- name: SSH | Ensure sshd is enabled and running
  ansible.builtin.service:
    name: "{{ bootstrap_ssh_service }}"
    state: started
    enabled: true
  become: true

- name: TARGET - Add authorized SSH key
  ansible.posix.authorized_key:
    user: "{{ ansible_facts['user_id'] }}"
    state: present
    key: "{{ bootstrap_ssh_pub_key }}"

- name: Configure SSH Basics (Global)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
    - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
    - { regexp: "^#?Protocol", line: "Protocol 2" }
  notify: "Restart {{ bootstrap_ssh_service }}"
  become: true

# --- FIREWALL LOGIC ---

- name: FIREWALL | Fedora (Firewalld) Setup
  when: ansible_facts['os_family'] == "RedHat"
  become: true
  block:
    - name: FIREWALL | Trust Tailscale and Restrict SSH
      ansible.posix.firewalld:
        rich_rule: 'rule family="ipv4" source address="{{ item }}" service name="ssh" accept'
        state: enabled
        immediate: true
        permanent: true
      loop: ["100.64.0.0/10", "198.162.112.2"]

- name: FIREWALL | Ubuntu (UFW) Setup
  when: ansible_facts['os_family'] == "Debian"
  become: true
  block:
    - name: FIREWALL | Deny all SSH by default
      community.general.ufw:
        rule: deny
        port: "22"
    - name: FIREWALL | Allow Tailscale and Specific IPs
      community.general.ufw:
        rule: allow
        src: "{{ item }}"
        port: "22"
        proto: tcp
      loop: ["100.64.0.0/10", "198.162.112.2"]

# --- LINGER LOGIC ---

- name: USER | Enable lingering (Cross-Platform)
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ ansible_facts['user_id'] }}"
    creates: "/var/lib/systemd/linger/{{ ansible_facts['user_id'] }}"
  become: true
