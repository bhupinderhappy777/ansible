---
- name: SSH | Ensure OpenSSH Server is installed
  ansible.builtin.package:
    name: openssh-server
    state: present
  become: true

- name: SSH | Ensure sshd is enabled and running
  ansible.builtin.service:
    name: "{{ bootstrap_ssh_service_name }}"
    state: started
    enabled: true
  become: true

- name: SSH | Add authorized SSH key
  ansible.posix.authorized_key:
    user: "{{ ansible_user | default(ansible_facts['user_id']) }}"
    state: present
    key: "{{ bootstrap_ssh_key }}"

- name: SSH | Configure SSH Basics (Global)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  loop:
    - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
    - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
    - { regexp: "^#?PubkeyAuthentication", line: "PubkeyAuthentication yes" }
  notify: "Restart SSH"
  become: true

# --- FIREWALL LOGIC ---

- name: FIREWALL | Fedora (Firewalld) Setup
  when: ansible_facts['os_family'] == "RedHat"
  become: true
  block:
    - name: FIREWALL | Allow Tailscale and Trusted IPs for SSH
      ansible.posix.firewalld:
        rich_rule: 'rule family="ipv4" source address="{{ item }}" service name="ssh" accept'
        state: enabled
        immediate: true
        permanent: true
      loop: "{{ bootstrap_trusted_ips }}"

- name: FIREWALL | Ubuntu (UFW) Setup
  when: ansible_facts['os_family'] == "Debian"
  become: true
  block:
    - name: FIREWALL | Deny all SSH by default
      community.general.ufw:
        rule: deny
        port: "22"
    - name: FIREWALL | Allow Tailscale and Trusted IPs for SSH
      community.general.ufw:
        rule: allow
        src: "{{ item }}"
        port: "22"
        proto: tcp
      loop: "{{ bootstrap_trusted_ips }}"

# --- LINGER LOGIC ---

- name: USER | Enable lingering (Cross-Platform)
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ ansible_user | default(ansible_facts['user_id']) }}"
    creates: "/var/lib/systemd/linger/{{ ansible_user | default(ansible_facts['user_id']) }}"
  become: true
