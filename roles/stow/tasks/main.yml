---
# 1. Check every item in the list individually
- name: Stow | Check status of existing config files
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/{{ item }}"
  register: stow_config_stats
  loop:
    - ".zshrc"
    - ".gitconfig"
    - ".local/share/konsole/my_profile.profile"
    - ".config/kwinrc"
    - ".config/kglobalshortcutsrc"
    - ".config/kscreenlockerrc"
    - ".config/kdeglobals"
    - ".config/kwalletrc"
    - ".config/konsolerc"
    - ".config/audacity/audacity.cfg"
    - ".config/doublecmd/doublecmd.xml"
    - ".config/doublecmd/shortcuts.scf"
    - ".config/doublecmd/colors.json"
    - ".config/doublecmd/multiarc.ini"
    - ".var/app/com.visualstudio.code/config/Code/User/settings.json"
    - ".var/app/com.visualstudio.code/config/Code/User/argv.json"

# 2. Purge only the specific items that are NOT symlinks
- name: Stow | Purge real files to allow for symlinks
  ansible.builtin.file:
    path: "{{ item.stat.path }}"
    state: absent
  when:
    - item.stat.exists
    - not item.stat.isdir
    - not item.stat.islnk
  loop: "{{ stow_config_stats.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Stow | Ensure VS Code config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.var/app/com.visualstudio.code/config/Code/User"
    state: directory
    mode: "0755"

# Ensure that stow is installed before attempting to use it
- name: Ensure stow is installed
  ansible.builtin.package:
    name: stow
    state: present
  become: true

# 3. Use --no-folding to prevent the .config conflict
- name: Stow Core Configurations
  ansible.builtin.command:
    cmd: "stow -R --no-folding -t {{ ansible_facts['user_dir'] }} {{ item }}"
  args:
    chdir: "{{ clone_dotfiles_home }}"
  loop:
    - "zsh"
    - "konsole"
    - "git"
    - "systemd"
    - "audacity"
    - "doublecmd"
    - "vscode"
  register: stow_result
  changed_when: "'LINK' in stow_result.stderr or 'SYMLINK' in stow_result.stderr"

- name: Stow Plasma common files
  ansible.builtin.command:
    # Adding --no-folding here is the MAGIC FIX for the .config error
    cmd: "stow -R --no-folding -t {{ ansible_facts['user_dir'] }} -d plasma common"
  args:
    chdir: "{{ clone_dotfiles_home }}"
  register: stow_plasma
  changed_when: "'LINK' in stow_plasma.stderr"
  tags: gui
